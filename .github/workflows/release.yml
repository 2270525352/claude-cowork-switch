name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS
            dist: dist:mac
            release: release:mac
          - os: windows-latest
            label: Windows
            dist: dist:win
            release: release:win
          - os: ubuntu-latest
            label: Linux
            dist: dist:linux
            release: release:linux

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build icons
        run: npm run build:icons

      - name: Run smoke tests
        run: npm test

      - name: Build (no publish)
        if: github.ref_type != 'tag'
        run: npm run ${{ matrix.dist }}

      - name: Build and publish to GitHub Release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run ${{ matrix.release }}

      - name: Upload artifact (manual builds)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: claude-cowork-switch-${{ matrix.label }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/*.tar.gz
          if-no-files-found: ignore
